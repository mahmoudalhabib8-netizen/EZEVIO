<svg
  viewBox="0 0 675 900"
  width="675"
  height="900"
  preserveAspectRatio="xMidYMid slice"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Full-card diagonal: dark charcoal, visible gradient across entire surface -->
    <linearGradient
      id="branory-fill"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="675"
      y2="900"
    >
      <stop offset="0" stop-color="#242424" />
      <stop offset="0.28" stop-color="#121212" />
      <stop offset="0.52" stop-color="#0d0d0d" />
      <stop offset="0.78" stop-color="#181818" />
      <stop offset="1" stop-color="#1f1f1f" />
    </linearGradient>
    <!-- Large radial so every pixel stays in-gradient (opaque stops only). -->
    <radialGradient
      id="branory-depth"
      gradientUnits="userSpaceOnUse"
      cx="520"
      cy="120"
      r="780"
    >
      <stop offset="0" stop-color="#2c2c2c" />
      <stop offset="0.35" stop-color="#151515" />
      <stop offset="0.72" stop-color="#101010" />
      <stop offset="1" stop-color="#1a1a1a" />
    </radialGradient>
  </defs>
  <rect width="675" height="900" fill="url(#branory-fill)" />
  <rect width="675" height="900" fill="url(#branory-depth)" opacity="0.55" />
</svg>
