name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Next.js 16 requires Node >= 20.9.0 (see next/package.json engines)
          node-version: "20"
          cache: npm
          cache-dependency-path: ezevio-web/package-lock.json

      - name: Install dependencies
        working-directory: ezevio-web
        run: npm ci

      - name: Build and export
        working-directory: ezevio-web
        env:
          NEXT_PUBLIC_BASE_PATH: /EZEVIO
        run: npm run build

      # Next.js static export does not prefix every root-absolute public URL when basePath is set;
      # GitHub project pages are served under /EZEVIO/, so patch HTML/CSS before upload.
      - name: Patch asset URLs for GitHub Pages base path
        working-directory: ezevio-web
        run: |
          find out -name '*.html' -exec sed -i 's|"/ezevio-logo|"/EZEVIO/ezevio-logo|g' {} +
          find out -name '*.css' -exec sed -i 's|url(/fonts/|url(/EZEVIO/fonts/|g' {} +

      # GitHub Pages runs Jekyll unless disabled; Jekyll skips paths starting with _
      # (including _next), so CSS/JS 404 and the site renders unstyled.
      - name: Disable Jekyll for static export
        working-directory: ezevio-web
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ezevio-web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
