name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Next.js 16 requires Node >= 20.9.0 (see next/package.json engines)
          node-version: "20"
          cache: npm
          cache-dependency-path: ezevio-web/package-lock.json

      - name: Install dependencies
        working-directory: ezevio-web
        run: npm ci

      # Custom domain (ezevio.com) serves this site at the domain root. Do not set
      # NEXT_PUBLIC_BASE_PATH=/EZEVIO here — that only matches username.github.io/REPO/
      # and breaks asset URLs on the apex domain (HTML requested /EZEVIO/_next/... but
      # files live at /_next/... → 404, unstyled page).
      - name: Build and export
        working-directory: ezevio-web
        env:
          NODE_ENV: production
        run: npm run build

      - name: Verify static export
        working-directory: ezevio-web
        run: test -d out && test -f out/index.html && test -d out/_next

      # GitHub Pages runs Jekyll unless disabled; Jekyll skips paths starting with _
      # (including _next), so CSS/JS 404 and the site renders unstyled.
      - name: Disable Jekyll for static export
        working-directory: ezevio-web
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ezevio-web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
